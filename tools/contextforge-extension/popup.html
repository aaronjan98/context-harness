<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; font-size: 13px; width: 300px; padding: 12px; margin: 0; color: #111; }
    h2 { font-size: 14px; margin: 0 0 10px; }

    .link { border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; }
    .link-row { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; margin-bottom: 2px; }
    .link-label { font-size: 10px; color: #888; min-width: 46px; }
    .link-value { font-family: monospace; font-size: 11px; color: #222; word-break: break-all; flex: 1; }
    .badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
    .badge-on  { background: #d1fae5; color: #065f46; }
    .badge-off { background: #fee2e2; color: #991b1b; }
    .actions { display: flex; gap: 6px; margin-top: 6px; }
    button { font-size: 12px; padding: 3px 8px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #f9f9f9; }
    button:hover { background: #eee; }
    button.danger { color: #b91c1c; border-color: #fca5a5; }

    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    .add-form label { display: block; font-size: 11px; color: #444; margin-bottom: 2px; margin-top: 6px; }
    .add-form input { width: 100%; box-sizing: border-box; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; }
    .add-form button { width: 100%; margin-top: 8px; font-size: 13px; padding: 5px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .add-form button:hover { background: #1d4ed8; }
    .add-form button:disabled { background: #93c5fd; cursor: default; }
    .hint { font-size: 10px; color: #888; margin: 4px 0 0; }
    .edit-view { margin-top: 4px; }
    .edit-label { display: block; font-size: 10px; color: #888; margin: 4px 0 1px; }
    .edit-view input { width: 100%; box-sizing: border-box; font-size: 11px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px; margin-bottom: 2px; font-family: monospace; }
    .primary-btn { background: #2563eb; color: white; border-color: #2563eb; }
    .primary-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h2>Context Forge Bridge</h2>
  <div id="links-container"></div>
  <hr>
  <div class="add-form">
    <label>CF Conversation ID</label>
    <input id="cf-id" placeholder="thread-…" />
    <label>ChatGPT Conversation URL</label>
    <input id="chatgpt-url" placeholder="https://chatgpt.com/c/…" />
    <button id="add-btn">Link</button>
    <p class="hint">Visit the ChatGPT conversation first — the URL auto-fills.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
